<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
   <title>Frontend Mentor | Order summary card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
     * { box-sizing: border-box; 
    }
     body{ font-family: 'Red Hat Display', sans-serif; background-color: hsl(0, 0%, 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .image img {border-radius: 10px 10px 0px 0px;}
    .image { background: white; border-radius: 10px; box-shadow: 0 1rem 1rem hsl(0, 0%, 0%, 0.2); margin-top: -300px; }
    .image-h1 { margin-top: 50px; margin-right: 10px;  }
    .image-p { margin-top: 0; margin-left: 120px;margin-bottom: 40px; font-size: 17px; max-width: 200px; }
    .annualplan { color: rgb(255, 0, 0); margin-left: 120px; font-size: 17px; }
    .music-icon img {display: grid; position: left; margin-left: 120px; margin-top: -20px; }
    .annualplan-change-button { margin-left: 2px;} 
    .annualplan-payment-button { margin-top: 32px;}
    .annualplan-cancel-button { border-radius: 5px; color: rgba(218, 6, 6, 0);}
    .background { display: flex; align-items: center; justify-content: center; margin-top: 100px; width: 100%; height: 100%; }
    
  </style>
</head>
<body>
    <div class="background">
      <img src="./images/pattern-background-desktop.svg" alt="Background pattern of blue circles">
    </div>
     
      <div class="image">
      <img src="./images/illustration-hero.svg" alt="Illustration of a person listening to music">
        
      <div>
        <h1 class="image-h1">Order Summary</h1>
        <p class="image-p">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
        <div class="annualplan-details">
          <img class="music-icon" src="./images/icon-music.svg" alt="Music icon">
          <p class="annualplan-plan"> <strong>Annual Plan</strong> 
          </p>
          <p class="annualplan-payment">$59.99/year 
          </p>

          <p class="annualplan-change-button"
            ><a href="#">Change</a>
          </p>
          <p class="annualplan-payment-button"> 
            <button>Proceed to Payment</button><br><br>
          </p>
          <p class="annualplan-cancel-button"> 
            <button>Cancel Order</button>
        
      </div>
      
    </div>
  </div>
</body>
</html>
